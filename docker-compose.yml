# =============================================================================
# TradingAgents — Docker Compose (RQ Worker + Redis)
# =============================================================================
# 使用方法（Usage）:
#
#   1. 准备 .env 文件（至少填入 DEEPSEEK_API_KEY）
#   2. 启动所有服务：
#        docker compose up -d
#   3. 查看日志：
#        docker compose logs -f
#   4. 停止服务：
#        docker compose down
#   5. 完全清理（包括数据卷）：
#        docker compose down -v
#
# API 服务需要单独启动（例如 uvicorn server.server:app --host 0.0.0.0 --port 8000）
# Worker 会自动连接 Redis 并处理提交的分析任务。
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis — RQ 任务队列的后端
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Worker — RQ 后台工作进程（执行实际的分析任务）
  # ---------------------------------------------------------------------------
  worker:
    build: .
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./server:/home/appuser/app/server
      - tradingagents_data:/home/appuser/.tradingagents
      - ./reports:/home/appuser/app/reports
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 扩展多个 Worker 并行处理任务：
    #   docker compose up -d --scale worker=3

volumes:
  redis_data:
  tradingagents_data:
